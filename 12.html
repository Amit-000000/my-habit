<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Tracker Pro 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #00ff88; --text: #fff; --border: #222; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        
        /* Purana Countdown Style (Big & Bold) */
        .year-countdown { background: linear-gradient(135deg, #111, #1a1a1a); padding: 25px; border-radius: 15px; margin: 20px auto; text-align: center; border: 1px solid var(--accent); width: 90%; max-width: 480px; box-shadow: 0 0 20px rgba(0,255,136,0.1); }
        .year-countdown h2 { margin: 0; color: var(--accent); font-size: 2rem; letter-spacing: 2px; }
        .year-countdown p { margin: 10px 0 0; font-size: 0.9rem; opacity: 0.7; }

        .container { width: 95%; max-width: 500px; margin: 0 auto; background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); }

        /* Goals Grid */
        .goals-grid { display: flex; justify-content: space-around; gap: 10px; margin-bottom: 25px; }
        .goal-circle { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        .goal-circle.today { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,255,136,0.2); }
        .goal-circle.month { border-color: #00bcd4; }
        .goal-circle.year { border-color: #ff9800; }
        .goal-circle span { font-size: 1.1rem; font-weight: bold; }
        .goal-circle label { font-size: 9px; text-transform: uppercase; margin-top: 4px; color: #888; }

        /* Habit Items */
        .protocol-item { display: flex; justify-content: space-between; padding: 14px; background: #181818; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); align-items: center; }
        .submit-btn { background: var(--accent); color: #000; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; font-size: 1rem; }

        /* Sidebar/Full Status */
        #profileSidebar { height: 100%; width: 0; position: fixed; z-index: 100; top: 0; right: 0; background: var(--bg); overflow-y: auto; transition: 0.5s; }
        .sidebar-inner { padding: 25px; }
        #chart-container { height: 320px; width: 100%; margin-bottom: 30px; background: #0a0a0a; border-radius: 20px; padding: 15px; box-sizing: border-box; border: 1px solid #1a1a1a; }

        /* History */
        .history-title { font-size: 1.5rem; color: var(--accent); margin: 40px 0 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .history-item { background: #111; padding: 16px; margin-top: 12px; border-radius: 12px; display: flex; justify-content: space-between; cursor: pointer; border: 1px solid var(--border); }
        .history-item:hover { border-color: var(--accent); }

        /* Modal */
        #detailModal { display: none; position: fixed; z-index: 200; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #161616; padding: 30px; border-radius: 25px; width: 85%; max-width: 420px; border: 1px solid var(--accent); box-shadow: 0 0 100px #000; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 199; }

        .profile-trigger { position: fixed; bottom: 25px; right: 25px; background: var(--accent); color: #000; padding: 14px 28px; border-radius: 40px; font-weight: bold; cursor: pointer; z-index: 90; box-shadow: 0 6px 20px rgba(0,255,136,0.3); }
    </style>
</head>
<body>

<div class="profile-trigger" onclick="openProfile()">📊 FULL STATUS</div>

<div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
<div id="detailModal">
    <h2 id="mDate" style="margin-top:0;">Date</h2>
    <div id="mPercent" style="font-size: 2rem; font-weight: 900; color: var(--accent); margin: 10px 0;">0%</div>
    <div id="mTasks"></div>
    <button onclick="closeModal()" class="submit-btn">CLOSE LOG</button>
</div>

<div id="profileSidebar">
    <div class="sidebar-inner">
        <button onclick="closeProfile()" style="color:#ff4444; background:none; border:none; cursor:pointer; font-weight:bold; font-size:1.1rem;">← BACK TO TODAY</button>
        
        <h2 style="text-align:center; margin: 30px 0 15px; letter-spacing: 1px;">PERFORMANCE GRAPH</h2>
        <div id="chart-container">
            <canvas id="progressChart"></canvas>
        </div>

        <div class="goals-grid" id="profileGoals"></div>

        <h3 class="history-title">ALL HISTORY LOGS</h3>
        <div id="historyList"></div>
    </div>
</div>

<div class="year-countdown">
    <h2 id="daysLeft">000 DAYS LEFT</h2>
    <p id="countdownLabel">2026</p>
</div>

<div class="container">
    <div class="goals-grid" id="mainGoals"></div>

    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <input type="text" id="pInput" placeholder="Add naya protocol..." style="flex:1; background:#1a1a1a; border:1px solid #333; color:white; padding:12px; border-radius:10px;">
        <button onclick="addP()" style="background:var(--accent); border:none; padding:0 20px; border-radius:10px; cursor:pointer; font-weight:bold;">+</button>
    </div>

    <div id="dailyList"></div>
    <button class="submit-btn" onclick="submitDay()">SUBMIT TODAY'S DATA</button>
</div>

<script>
    let protocols = JSON.parse(localStorage.getItem('myP')) || ["Wake up 5 AM", "Cold Shower", "4hr Deep Work"];
    let history = JSON.parse(localStorage.getItem('myH')) || {};
    const today = new Date().toISOString().split('T')[0];

    function updateCountdown() {
        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        const dayOfYear = Math.floor((now - start) / 86400000);
        document.getElementById('daysLeft').innerText = (365 - dayOfYear) + " DAYS LEFT";
    }

    function getGoalsHTML() {
        let tPerc = history[today] ? history[today].percent : 0;
        let mTotal = 0, mCount = 0, yTotal = 0, yCount = 0;
        let curMonth = today.substring(0, 7);
        for(let d in history) {
            if(d.startsWith(curMonth)) { mTotal += history[d].percent; mCount++; }
            if(d.startsWith("2026")) { yTotal += history[d].percent; yCount++; }
        }
        let mPerc = mCount ? Math.round(mTotal/mCount) : 0;
        let yPerc = yCount ? Math.round(yTotal/yCount) : 0;
        return `
            <div class="goal-circle today"><span>${tPerc}%</span><label>Today</label></div>
            <div class="goal-circle month"><span>${mPerc}%</span><label>Month</label></div>
            <div class="goal-circle year"><span>${yPerc}%</span><label>Yearly</label></div>
        `;
    }

    function renderDaily() {
        const list = document.getElementById('dailyList');
        list.innerHTML = '';
        protocols.forEach((p, i) => {
            const isChecked = (history[today] && history[today].tasks[p]) ? 'checked' : '';
            list.innerHTML += `
                <div class="protocol-item">
                    <span>${p} <small onclick="delP(${i})" style="color:#666; cursor:pointer; margin-left:12px;">[del]</small></span>
                    <input type="checkbox" class="cb" data-p="${p}" ${isChecked} style="width:22px; height:22px; accent-color:#00ff88;">
                </div>`;
        });
        document.getElementById('mainGoals').innerHTML = getGoalsHTML();
    }

    function addP() {
        let v = document.getElementById('pInput').value;
        if(v) { protocols.push(v); localStorage.setItem('myP', JSON.stringify(protocols)); renderDaily(); document.getElementById('pInput').value=''; }
    }
    function delP(i) { protocols.splice(i, 1); localStorage.setItem('myP', JSON.stringify(protocols)); renderDaily(); }

    function submitDay() {
        let stats = {}; let done = 0;
        document.querySelectorAll('.cb').forEach(c => {
            stats[c.dataset.p] = c.checked;
            if(c.checked) done++;
        });
        let p = protocols.length ? Math.round((done / protocols.length) * 100) : 0;
        history[today] = { tasks: stats, percent: p };
        localStorage.setItem('myH', JSON.stringify(history));
        renderDaily();
        alert("Success! " + p + "% Progress Captured.");
    }

    function openProfile() {
        document.getElementById('profileSidebar').style.width = "100%";
        document.getElementById('profileGoals').innerHTML = getGoalsHTML();
        updateHistoryList();
    }
    function closeProfile() { document.getElementById('profileSidebar').style.width = "0"; }

    function updateHistoryList() {
        const hList = document.getElementById('historyList');
        hList.innerHTML = '';
        let dates = Object.keys(history).sort().reverse();
        dates.forEach(d => {
            hList.innerHTML += `
                <div class="history-item" onclick="showDetail('${d}')">
                    <span>📅 ${d}</span>
                    <strong style="color:var(--accent)">${history[d].percent}%</strong>
                </div>`;
        });
        renderChart(dates.sort(), dates.map(d => history[d].percent));
    }

    function showDetail(d) {
        document.getElementById('mDate').innerText = d;
        document.getElementById('mPercent').innerText = history[d].percent + "%";
        let tasks = history[d].tasks;
        let html = '<ul style="list-style:none; padding:0; margin-top:15px;">';
        for(let t in tasks) {
            html += `<li style="padding:12px 0; border-bottom:1px solid #222; display:flex; justify-content:space-between; font-size:1.1rem;">
                ${t} <span>${tasks[t] ? '✅' : '❌'}</span></li>`;
        }
        document.getElementById('mTasks').innerHTML = html + '</ul>';
        document.getElementById('detailModal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModal() { document.getElementById('detailModal').style.display='none'; document.getElementById('overlay').style.display='none'; }

    let chart;
    function renderChart(l, d) {
        const ctx = document.getElementById('progressChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: l.slice(-10), datasets: [{ label: 'Performance %', data: d.slice(-10), borderColor: '#00ff88', tension: 0.4, fill: true, backgroundColor: 'rgba(0,255,136,0.1)', borderWidth: 3, pointBackgroundColor: '#00ff88' }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100, grid: { color: '#111' } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
        });
    }

    updateCountdown();
    renderDaily();
</script>
</body>
</html>
