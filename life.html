<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Tracker Pro 2026-2027</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #00ff88; --text: #fff; --border: #222; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        .year-countdown { background: linear-gradient(135deg, #111, #1a1a1a); padding: 25px; border-radius: 15px; margin: 20px auto; text-align: center; border: 1px solid var(--accent); width: 90%; max-width: 480px; box-shadow: 0 0 20px rgba(0,255,136,0.1); }
        .year-countdown h2 { margin: 0; color: var(--accent); font-size: 2rem; letter-spacing: 2px; }
        .container { width: 95%; max-width: 500px; margin: 0 auto; background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); }
        .goals-grid { display: flex; justify-content: space-around; gap: 10px; margin-bottom: 25px; }
        .goal-circle { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        .goal-circle.today { border-color: var(--accent); }
        .protocol-item { display: flex; justify-content: space-between; padding: 14px; background: #181818; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); align-items: center; }
        .submit-btn { background: var(--accent); color: #000; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        #profileSidebar { height: 100%; width: 0; position: fixed; z-index: 100; top: 0; right: 0; background: var(--bg); overflow-y: auto; transition: 0.5s; padding-top: 20px; }
        .history-item { background: #111; padding: 16px; margin-top: 12px; border-radius: 12px; display: flex; justify-content: space-between; border: 1px solid var(--border); cursor: pointer; }
        #detailModal { display: none; position: fixed; z-index: 200; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #161616; padding: 30px; border-radius: 25px; width: 85%; max-width: 420px; border: 1px solid var(--accent); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 199; }
        .profile-trigger { position: fixed; bottom: 25px; right: 25px; background: var(--accent); color: #000; padding: 14px 28px; border-radius: 40px; font-weight: bold; cursor: pointer; z-index: 90; }
    </style>
</head>
<body>

<div class="profile-trigger" onclick="openProfile()">📊 FULL STATUS</div>

<div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
<div id="detailModal">
    <h2 id="mDate">Date</h2>
    <div id="mPercent" style="font-size: 2.5rem; color: var(--accent); font-weight: 900;">0%</div>
    <div id="mTasks"></div>
    <button onclick="closeModal()" class="submit-btn">CLOSE</button>
</div>

<div id="profileSidebar">
    <div style="padding: 20px;">
        <button onclick="closeProfile()" style="color:red; background:none; border:none; cursor:pointer;">← BACK</button>
        <h2 style="text-align:center;">ARCHIVE HISTORY</h2>
        <div style="height:200px; margin-bottom:20px;"><canvas id="progressChart"></canvas></div>
        <button class="submit-btn" style="background:#ff3366; color:white; margin-bottom:20px;" onclick="downloadPDF()">📄 DOWNLOAD ALL-TIME PDF</button>
        <div id="historyList"></div>
    </div>
</div>

<div class="year-countdown">
    <h2 id="daysLeft">000 DAYS LEFT</h2>
    <p>ULTIMATE 2026 DISCIPLINE</p>
</div>

<div class="container">
    <div class="goals-grid" id="mainGoals"></div>
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <input type="text" id="pInput" placeholder="Add naya target..." style="flex:1; background:#1a1a1a; border:1px solid #333; color:white; padding:12px; border-radius:10px;">
        <button onclick="addP()" style="background:var(--accent); border:none; padding:0 20px; border-radius:10px; font-weight:bold;">+</button>
    </div>
    <div id="dailyList"></div>
    <button class="submit-btn" onclick="submitDay()">SUBMIT TODAY'S DATA</button>
</div>

<script>
    // LOAD MASTER DATA (All years included)
    let protocols = JSON.parse(localStorage.getItem('myP')) || ["Wake up 5 AM", "Cold Shower", "4hr Deep Work"];
    let masterHistory = JSON.parse(localStorage.getItem('masterH')) || { "2026": {} };
    
    const now = new Date();
    const today = now.toISOString().split('T')[0];
    const currentYear = now.getFullYear().toString();

    // Year Folder Management
    if (!masterHistory[currentYear]) {
        masterHistory[currentYear] = {};
        localStorage.setItem('masterH', JSON.stringify(masterHistory));
    }

    function updateCountdown() {
        const start = new Date(now.getFullYear(), 0, 0);
        const dayOfYear = Math.floor((now - start) / 86400000);
        document.getElementById('daysLeft').innerText = (365 - dayOfYear) + " DAYS LEFT";
    }

    function renderDaily() {
        const list = document.getElementById('dailyList');
        list.innerHTML = '';
        protocols.forEach((p, i) => {
            const isChecked = (masterHistory[currentYear][today] && masterHistory[currentYear][today].tasks && masterHistory[currentYear][today].tasks[p]) ? 'checked' : '';
            list.innerHTML += `
                <div class="protocol-item">
                    <span>${p} <small onclick="delP(${i})" style="color:#555; cursor:pointer; margin-left:10px;">[del]</small></span>
                    <input type="checkbox" class="cb" data-p="${p}" ${isChecked} style="width:22px; height:22px;">
                </div>`;
        });
        updateGoals();
    }

    function addP() {
        let v = document.getElementById('pInput').value;
        if(v) { protocols.push(v); localStorage.setItem('myP', JSON.stringify(protocols)); renderDaily(); document.getElementById('pInput').value=''; }
    }

    function delP(i) {
        if(confirm("Target delete karein?")) { protocols.splice(i, 1); localStorage.setItem('myP', JSON.stringify(protocols)); renderDaily(); }
    }

    function submitDay() {
        let stats = {}; let done = 0;
        document.querySelectorAll('.cb').forEach(c => {
            stats[c.dataset.p] = c.checked;
            if(c.checked) done++;
        });
        let p = protocols.length ? Math.round((done / protocols.length) * 100) : 0;
        masterHistory[currentYear][today] = { tasks: stats, percent: p };
        localStorage.setItem('masterH', JSON.stringify(masterHistory));
        renderDaily();
        alert("Data Saved Successfully!");
    }

    function updateGoals() {
        let yearData = masterHistory[currentYear];
        let tPerc = yearData[today] ? yearData[today].percent : 0;
        document.getElementById('mainGoals').innerHTML = `
            <div class="goal-circle today"><span>${tPerc}%</span><label>Today</label></div>
            <div class="goal-circle" style="border-color:#00bcd4;"><span>2026</span><label>Year</label></div>
        `;
    }

    function openProfile() {
        document.getElementById('profileSidebar').style.width = "100%";
        const hList = document.getElementById('historyList');
        hList.innerHTML = '';
        Object.keys(masterHistory).sort().reverse().forEach(year => {
            let dates = Object.keys(masterHistory[year]).sort().reverse();
            if(dates.length > 0) {
                hList.innerHTML += `<h3 style="color:var(--accent); margin-top:25px; border-bottom:1px solid #333;">📂 YEAR ${year}</h3>`;
                dates.forEach(d => {
                    hList.innerHTML += `
                        <div class="history-item" onclick="showDetail('${year}','${d}')">
                            <span>📅 ${d}</span><strong>${masterHistory[year][d].percent}%</strong>
                        </div>`;
                });
            }
        });
        renderChart();
    }

    function showDetail(year, date) {
        let data = masterHistory[year][date];
        document.getElementById('mDate').innerText = date;
        document.getElementById('mPercent').innerText = data.percent + "%";
        let html = '<ul>';
        for(let t in data.tasks) { html += `<li>${t}: ${data.tasks[t] ? '✅' : '❌'}</li>`; }
        document.getElementById('mTasks').innerHTML = html + '</ul>';
        document.getElementById('detailModal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function downloadPDF() {
    const element = document.createElement('div');
    element.style.padding = '40px';
    element.style.background = '#fff';
    element.style.color = '#000';
    element.style.fontFamily = "'Segoe UI', Roboto, Helvetica, Arial, sans-serif";
    
    // Yearly Stats Calculation
    let totalPerc = 0;
    let days = Object.keys(masterHistory[currentYear]);
    days.forEach(d => totalPerc += masterHistory[currentYear][d].percent);
    let avg = days.length ? Math.round(totalPerc / days.length) : 0;

    // 1. PDF Header (Clean & Bold)
    let content = `
        <div style="border-bottom: 4px solid #00ff88; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1 style="margin:0; font-size: 26px; color: #111;">ELITE TRACKER MASTER REPORT</h1>
                <p style="margin:5px 0; font-size: 14px; color: #666;">Data Archive Year: <strong>2026-2027</strong></p>
            </div>
            <div style="text-align: right; background: #f4f4f4; padding: 10px 20px; border-radius: 10px;">
                <div style="font-size: 24px; font-weight: 900; color: #00b359;">${avg}%</div>
                <div style="font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px;">Overall Efficiency</div>
            </div>
        </div>
        
        <table style="width:100%; border-collapse: collapse; margin-bottom: 40px;">
            <thead>
                <tr style="background: #222; color: #fff; text-align: left;">
                    <th style="padding: 12px; font-size: 13px; width: 120px; border: 1px solid #333;">DATE</th>
                    <th style="padding: 12px; font-size: 13px; width: 80px; border: 1px solid #333;">SCORE</th>
                    <th style="padding: 12px; font-size: 13px; border: 1px solid #333;">DETAILED TARGETS STATUS</th>
                </tr>
            </thead>
            <tbody>`;

    // 2. Yearly/Monthly Data Loop
    Object.keys(masterHistory).reverse().forEach(year => {
        let yearData = masterHistory[year];
        let sortedDates = Object.keys(yearData).sort().reverse();
        
        sortedDates.forEach(date => {
            let day = yearData[date];
            let taskListHTML = '';
            
            // Har target ko line-by-line dikhane ke liye loop
            for (let t in day.tasks) {
                let status = day.tasks[t] ? 
                    '<span style="color: #008000; font-weight: bold;">[COMPLETED]</span>' : 
                    '<span style="color: #d00000;">[MISSED]</span>';
                taskListHTML += `<div style="margin-bottom: 4px; border-bottom: 1px dashed #eee; padding: 2px 0;">• ${t} ${status}</div>`;
            }

            content += `
                <tr>
                    <td style="padding: 12px; font-size: 12px; font-weight: bold; border: 1px solid #ddd; vertical-align: top; background: #fafafa;">${date}</td>
                    <td style="padding: 12px; font-size: 14px; font-weight: 900; border: 1px solid #ddd; vertical-align: top; text-align: center; color: ${day.percent >= 80 ? '#00b359' : '#e60000'};">
                        ${day.percent}%
                    </td>
                    <td style="padding: 10px; font-size: 11px; border: 1px solid #ddd; color: #333; line-height: 1.5;">
                        ${taskListHTML || '<i style="color:#999;">No targets were set for this day</i>'}
                    </td>
                </tr>`;
        });
    });

    content += `</tbody></table>`;

    // 3. Footer Analysis Section
    content += `
        <div style="margin-top: 30px; padding: 20px; border-left: 5px solid #00ff88; background: #f9f9f9;">
            <h3 style="margin: 0 0 10px 0; font-size: 16px;">System Remarks</h3>
            <p style="font-size: 12px; color: #555; line-height: 1.6;">
                This document contains the complete digital footprints of your 2026-2027 discipline journey. 
                Data is archived in 365-day cycles. All targets and success rates are calculated based on 
                your local storage 'Master Folder'.
            </p>
        </div>`;

    element.innerHTML = content;

    // 4. PDF Configuration (High Quality & Compact)
    const opt = {
        margin: 0.4,
        filename: `Elite_Archive_2026.pdf`,
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2, letterRendering: true, useCORS: true },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
    };

    // Run the download
    html2pdf().set(opt).from(element).save();
}

    function closeProfile() { document.getElementById('profileSidebar').style.width = "0"; }
    function closeModal() { document.getElementById('detailModal').style.display='none'; document.getElementById('overlay').style.display='none'; }

    updateCountdown();
    renderDaily();
</script>
</body>
</html>
